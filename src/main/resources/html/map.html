<!DOCTYPE html>
<html>
<head>
    <title>Workshop Location Picker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100%; cursor: crosshair; }
        #instruction {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 25px;
            border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: sans-serif; font-weight: bold; color: #0ea5e9;
        }
    </style>
</head>
<body>
<div id="instruction">🔍 Search for a place or click the map</div>
<div id="map"></div>

<script>
    var map = L.map('map').setView([36.8065, 10.1815], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© CARTO'
    }).addTo(map);

    var marker;

    // Function to send data to Java
    function syncWithJava(lat, lng) {
        const status = document.getElementById('instruction');
        status.innerText = "⏳ Syncing...";

        fetch(`http://127.0.0.1:8089/set-coords?lat=${lat}&lng=${lng}`, {
            mode: 'no-cors'
        })
            .then(() => {
                status.innerText = "✅ Registered: " + lat + ", " + lng;
                status.style.color = "#22c55e";
            })
            .catch(() => {
                status.innerText = "❌ Java App Not Responding";
                status.style.color = "#ef4444";
            });
    }

    // 1. Handle Manual Clicks
    map.on('click', function(e) {
        var lat = e.latlng.lat.toFixed(6);
        var lng = e.latlng.lng.toFixed(6);

        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lng]).addTo(map);

        syncWithJava(lat, lng);
    });

    // 2. Add Search Control (Geocoder)
    var geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Search for address...",
        errorMessage: "Nothing found."
    })
        .on('markgeocode', function(e) {
            var latlng = e.geocode.center;
            var lat = latlng.lat.toFixed(6);
            var lng = latlng.lng.toFixed(6);

            // Move map to the found place
            map.setView(latlng, 16);

            // Update Marker
            if (marker) map.removeLayer(marker);
            marker = L.marker(latlng).addTo(map);

            // Sync with Java automatically on search
            syncWithJava(lat, lng);
        })
        .addTo(map);
</script>
</body>
</html>
